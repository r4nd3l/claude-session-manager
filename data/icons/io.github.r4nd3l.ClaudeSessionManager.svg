<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#262320"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="none" stroke="#4a443c" stroke-width="2" opacity="0.6"/>

  <!-- Claude asterisk -->
  <g stroke="#D97757" stroke-width="9" stroke-linecap="round">
    <line x1="64" y1="38" x2="64" y2="22"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(45 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(90 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(135 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(180 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(225 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(270 64 50)"/>
    <line x1="64" y1="38" x2="64" y2="22" transform="rotate(315 64 50)"/>
  </g>

  <!-- prompt line: chevron + cursor -->
  <polyline points="38,88 50,96 38,104" fill="none" stroke="#EDE9E1" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="62" y="90" width="24" height="12" rx="3" fill="#EDE9E1" opacity="0.85"/>
</svg>
